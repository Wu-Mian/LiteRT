name: Build LiteRT Libraries

on:
  push:
    branches: [ main ] # 在主分支推送时触发
  pull_request:
    branches: [ main ] # 在向主分支发起 PR 时触发
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    name: Build LiteRT for ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # 即使一个构建失败，其他构建也会继续
      matrix:
        include:
          # --- Linux ---
          - os: ubuntu-latest
            target_name: Linux-x64
            bazel_version: 6.4.0 # 或 LiteRT 兼容的最新 Bazel 版本
            bazel_config: "--config=linux_x86_64 -c opt" # 优化编译
            artifact_suffix: linux-x64
            setup_script: |
              sudo apt-get update && sudo apt-get install -y build-essential python3-dev curl zip

          # --- macOS ---
          - os: macos-latest # 通常包含 Xcode
            target_name: macOS-Universal # x86_64 + arm64
            bazel_version: 6.4.0
            # 使用 --macos_cpus 构建 Universal Binary
            bazel_config: "--macos_cpus=x86_64,arm64 --config=macos -c opt"
            artifact_suffix: macos-universal
            setup_script: "" # macOS runner 通常包含必要工具

          # --- Windows ---
          - os: windows-latest # 通常包含 Visual Studio Build Tools
            target_name: Windows-x64
            bazel_version: 6.4.0
            bazel_config: "--config=windows_x86_64 -c opt"
            artifact_suffix: windows-x64
            setup_script: "" # Windows runner 通常包含必要工具, Bazel 会尝试寻找 MSVC

          # --- Android --- (使用 Linux runner 进行交叉编译)
          - os: ubuntu-latest
            target_name: Android-arm64-v8a
            bazel_version: 6.4.0
            bazel_config: "--config=android_arm64 -c opt"
            artifact_suffix: android-arm64-v8a
            setup_script: |
              sudo apt-get update && sudo apt-get install -y openjdk-11-jdk python3-dev curl zip
              # 安装 Android SDK 和 NDK (示例, 可能需要调整版本)
              export ANDROID_HOME=$HOME/android-sdk
              export ANDROID_NDK_HOME=$ANDROID_HOME/ndk-bundle # 或指定 NDK 版本路径
              mkdir -p $ANDROID_HOME
              # 下载并解压 Android 命令行工具
              wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
              unzip cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
              mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
              # 设置 PATH
              export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
              # 接受许可证并安装 NDK 和 Platform Tools
              yes | sdkmanager --licenses > /dev/null
              sdkmanager "platform-tools" "ndk;25.2.9519653" # 使用特定 NDK 版本
              export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653 # 更新 NDK 路径
              # 验证 NDK 路径 (可选)
              ls $ANDROID_NDK_HOME
              echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
              echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}" >> $GITHUB_ENV

          - os: ubuntu-latest
            target_name: Android-armeabi-v7a
            bazel_version: 6.4.0
            bazel_config: "--config=android_arm -c opt"
            artifact_suffix: android-armeabi-v7a
            # setup_script 与 arm64-v8a 相同 (可以优化为共享步骤)
            setup_script: |
              sudo apt-get update && sudo apt-get install -y openjdk-11-jdk python3-dev curl zip
              export ANDROID_HOME=$HOME/android-sdk
              export ANDROID_NDK_HOME=$ANDROID_HOME/ndk-bundle
              mkdir -p $ANDROID_HOME
              wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
              unzip cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
              mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
              export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
              yes | sdkmanager --licenses > /dev/null
              sdkmanager "platform-tools" "ndk;25.2.9519653"
              export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
              ls $ANDROID_NDK_HOME
              echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
              echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}" >> $GITHUB_ENV

          # --- iOS --- (使用 macOS runner 进行交叉编译)
          - os: macos-latest
            target_name: iOS-arm64
            bazel_version: 6.4.0
            # 需要 Xcode 和 iOS SDK
            bazel_config: "--config=ios_arm64 -c opt"
            artifact_suffix: ios-arm64
            setup_script: "" # macOS runner 通常包含 Xcode

          - os: macos-latest
            target_name: iOS-Simulator-arm64 # M1/M2 Mac 上的模拟器
            bazel_version: 6.4.0
            bazel_config: "--config=ios_sim_arm64 -c opt"
            artifact_suffix: ios-simulator-arm64
            setup_script: ""

          - os: macos-latest
            target_name: iOS-Simulator-x86_64 # Intel Mac 上的模拟器
            bazel_version: 6.4.0
            bazel_config: "--config=ios_x86_64 -c opt"
            artifact_suffix: ios-simulator-x86_64
            setup_script: ""

    steps:
    - name: Checkout LiteRT source code
      uses: actions/checkout@v4
      with:
        # 如果 LiteRT 使用了 Git LFS, 需要启用
        # lfs: true
        # 如果 LiteRT 依赖 Git Submodules, 需要递归检出
        # submodules: 'recursive'
        repository: google-ai-edge/LiteRT # 明确指定仓库

    - name: Setup Platform Dependencies
      if: matrix.setup_script != ''
      shell: bash # 确保在 Linux/macOS 上使用 bash
      run: ${{ matrix.setup_script }}

    # Windows 需要特殊处理路径和环境设置 (如果 Bazel 自动查找失败)
    # - name: Setup MSVC environment (Windows only)
    #   if: runner.os == 'Windows'
    #   uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Bazelisk (Manages Bazel versions)
      uses: bazelbuild/setup-bazelisk@v3
      # Bazelisk 会读取项目根目录的 .bazelversion 文件 (如果存在)
      # 或者你可以强制指定版本如下:
      # with:
      #   bazel-version: ${{ matrix.bazel_version }}

    # 某些 Bazel 项目 (尤其是 TensorFlow 相关) 需要配置工作区
    # LiteRT 可能继承了 TFLite 的这个需求, 检查是否有 configure.py 或类似脚本
    # 如果需要, 在这里运行配置步骤, 并设置必要的环境变量 (如 PYTHON_BIN_PATH)
    # - name: Configure Workspace (if necessary)
    #   run: |
    #     # export PYTHON_BIN_PATH=$(which python3) # 示例
    #     # ./configure # 或者其他配置命令

    - name: Build LiteRT C API Library
      shell: bash # 在 Windows 上也使用 bash (Git Bash) 以统一命令
      run: |
        echo "Building with Bazel config: ${{ matrix.bazel_config }}"
        # Bazel 构建命令, 目标是 C API 库
        # //tensorflow/lite/c:litert_c_api 是 LiteRT C API 的目标路径 (基于 TFLite 结构)
        # --verbose_failures 提供更详细的错误输出
        # --jobs=2 限制并发任务数，避免资源耗尽 (根据需要调整)
        bazel build //tensorflow/lite/c:litert_c_api ${{ matrix.bazel_config }} --verbose_failures --jobs=2

    - name: Prepare Artifacts
      shell: bash
      run: |
        # 创建用于存放构建产物的目录结构
        ARTIFACT_DIR="litert_build_${{ matrix.artifact_suffix }}"
        mkdir -p "${ARTIFACT_DIR}/lib"
        mkdir -p "${ARTIFACT_DIR}/include/tensorflow/lite/c" # 创建 LiteRT 头文件所需路径

        # 查找构建生成的库文件 (通常在 bazel-bin 目录下)
        # 注意: 文件名和扩展名可能因平台和构建类型(静态/动态)而异
        # 这里假设是静态库 (.a / .lib)
        LIB_PATH=$(bazel cquery //tensorflow/lite/c:litert_c_api ${{ matrix.bazel_config }} --output=files)
        echo "Found library file: ${LIB_PATH}"

        # 检查 LIB_PATH 是否为空或者无效
        if [ -z "$LIB_PATH" ] || [ ! -f "$LIB_PATH" ]; then
          echo "Error: Could not find built library file for target //tensorflow/lite/c:litert_c_api"
          # 尝试查找 bazel-bin 目录下的文件作为备选方案
          echo "Searching in bazel-bin..."
          find bazel-bin/ -name "liblitert_c_api.*" # 打印找到的文件
          # 如果需要更健壮的查找，可能需要调整 find 命令
          LIB_PATH=$(find bazel-bin/ -path '*/tensorflow/lite/c/*liblitert_c_api.*' -print -quit)
          if [ -z "$LIB_PATH" ] || [ ! -f "$LIB_PATH" ]; then
             echo "Error: Still could not find library file in bazel-bin."
             exit 1
          fi
          echo "Using found library: ${LIB_PATH}"
        fi

        # 复制库文件
        cp "${LIB_PATH}" "${ARTIFACT_DIR}/lib/"

        # 复制头文件 (从源代码树复制)
        # 需要根据 LiteRT 的实际头文件位置调整
        cp tensorflow/lite/c/*.h "${ARTIFACT_DIR}/include/tensorflow/lite/c/"

        # （可选）复制其他必要的头文件，例如 TFLite Common 头文件
        # cp tensorflow/lite/common/*.h "${ARTIFACT_DIR}/include/tensorflow/lite/common/" # 示例

        # 打包成压缩文件
        if [ "$RUNNER_OS" == "Windows" ]; then
          7z a "${ARTIFACT_DIR}.zip" "${ARTIFACT_DIR}/"
        else
          tar -czvf "${ARTIFACT_DIR}.tar.gz" "${ARTIFACT_DIR}/"
        fi
        echo "ARCHIVE_NAME=${ARTIFACT_DIR}" >> $GITHUB_ENV # 供下一步使用

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: litert-libs-${{ matrix.artifact_suffix }}
        path: | # 上传压缩包
          ${{ env.ARCHIVE_NAME }}.* # 使用通配符匹配 .zip 或 .tar.gz
        retention-days: 7 # 设置产物保留时间
