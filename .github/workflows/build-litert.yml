name: Build LiteRT Android Library

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'
          
      - name: Install Bazelisk
        run: |
          # 下载适用于 Linux 的 Bazelisk 二进制文件
          curl -L -o bazelisk https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x bazelisk
          # 移动到系统 PATH 中，更名为 bazel
          sudo mv bazelisk /usr/local/bin/bazel
          echo "Bazel version:"
          bazel version

      - name: Build LiteRT Android Library
        run: |
          # 使用 Bazel 构建目标
          # --config=android 确保调用 Android 交叉编译所需配置，
          # --compilation_mode=opt 输出优化版本，
          # --verbose_failures 便于调试错误信息
          bazel build //lite_rt:litert --config=android --compilation_mode=opt --verbose_failures

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LiteRT-android
          # 根据实际需要调整上传路径，此处上传整个 bazel-bin 目录下所有文件
          path: bazel-bin/**
