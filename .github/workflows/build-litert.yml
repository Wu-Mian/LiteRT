name: Build LiteRT Libraries

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build LiteRT for ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux ---
          - os: ubuntu-latest
            target_name: Linux-x64
            bazel_config: "--config=linux_x86_64 -c opt"
            artifact_suffix: linux-x64
            setup_script: |
              set -ex # Exit on error, print commands
              sudo apt-get update && sudo apt-get install -y build-essential python3-dev python3-pip curl zip git
              # LiteRT/TFLite often needs specific numpy version
              pip3 install numpy==1.23.5 wheel # Adjust numpy version if needed based on LiteRT setup logs

          # --- macOS ---
          - os: macos-latest
            target_name: macOS-Universal
            # Note: Universal build might take longer and require more disk space
            bazel_config: "--macos_cpus=x86_64,arm64 --config=macos -c opt"
            artifact_suffix: macos-universal
            setup_script: |
              set -ex
              # Ensure Python and pip are available for configuration
              brew install python || true # Install if not present, ignore if already installed
              pip3 install numpy==1.23.5 wheel # Adjust numpy version if needed

          # --- Windows ---
          - os: windows-latest
            target_name: Windows-x64
            bazel_config: "--config=windows_x86_64 -c opt"
            artifact_suffix: windows-x64
            # Bazel on Windows needs bash for some operations
            shell: bash
            setup_script: |
              set -ex
              # Ensure Python and pip are available
              # GitHub Windows runners usually have Python, ensure pip and numpy
              python -m pip install --upgrade pip
              pip install numpy==1.23.5 wheel # Adjust numpy version if needed

          # --- Android --- (Using Linux runner)
          - os: ubuntu-latest
            target_name: Android-arm64-v8a
            bazel_config: "--config=android_arm64 -c opt"
            artifact_suffix: android-arm64-v8a
            # Group common Android setup into one script
            setup_script: |
              set -ex # Exit on error, print commands
              sudo apt-get update && sudo apt-get install -y openjdk-11-jdk python3-dev python3-pip curl zip git wget unzip
              pip3 install numpy==1.23.5 wheel # Adjust numpy version if needed

              # Install Android SDK Command-line Tools
              export ANDROID_SDK_ROOT=$HOME/android-sdk
              mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
              # Use a slightly older known good version or stick to latest and hope
              # wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
              wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
              unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
              # The zip now often extracts into cmdline-tools/cmdline-tools directly
              # Adjust based on actual extracted structure
              mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest || true # Handle case where it's already named latest
              rm cmdline-tools.zip

              # Add to PATH
              export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools

              # Update sdkmanager itself first!
              echo "Updating sdkmanager..."
              sdkmanager --update || echo "sdkmanager update failed, proceeding anyway..." # Try updating, but don't fail job if update fails

              # Accept licenses non-interactively BEFORE trying to install packages
              echo "Accepting licenses..."
              yes | sdkmanager --licenses || echo "Failed to accept licenses automatically. Check for prompts or XML errors."

              # Install NDK and Platform Tools (Specify a known good NDK version if possible)
              NDK_VERSION="25.2.9519653" # Or check LiteRT docs for recommended version
              echo "Installing NDK ${NDK_VERSION} and platform-tools..."
              sdkmanager "platform-tools" "ndk;${NDK_VERSION}"

              # Set environment variables for Bazel
              export ANDROID_HOME=$ANDROID_SDK_ROOT # Some tools use ANDROID_HOME
              export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION

              # Verify NDK installation
              if [ ! -d "$ANDROID_NDK_HOME" ]; then
                echo "Error: Android NDK not found at $ANDROID_NDK_HOME after installation attempt."
                ls -l $ANDROID_SDK_ROOT/ndk/ # List contents for debugging
                exit 1
              fi
              echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
              echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}" >> $GITHUB_ENV
              echo "NDK Path: $ANDROID_NDK_HOME"
              ls -l $ANDROID_NDK_HOME # Confirm NDK contents

          - os: ubuntu-latest
            target_name: Android-armeabi-v7a
            bazel_config: "--config=android_arm -c opt"
            artifact_suffix: android-armeabi-v7a
            # Use the same setup script as arm64-v8a
            setup_script: |
              set -ex
              sudo apt-get update && sudo apt-get install -y openjdk-11-jdk python3-dev python3-pip curl zip git wget unzip
              pip3 install numpy==1.23.5 wheel # Adjust numpy version if needed
              export ANDROID_SDK_ROOT=$HOME/android-sdk
              mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
              wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
              unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
              mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest || true
              rm cmdline-tools.zip
              export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
              echo "Updating sdkmanager..."
              sdkmanager --update || echo "sdkmanager update failed, proceeding anyway..."
              echo "Accepting licenses..."
              yes | sdkmanager --licenses || echo "Failed to accept licenses automatically."
              NDK_VERSION="25.2.9519653"
              echo "Installing NDK ${NDK_VERSION} and platform-tools..."
              sdkmanager "platform-tools" "ndk;${NDK_VERSION}"
              export ANDROID_HOME=$ANDROID_SDK_ROOT
              export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION
              if [ ! -d "$ANDROID_NDK_HOME" ]; then
                echo "Error: Android NDK not found at $ANDROID_NDK_HOME after installation attempt."
                ls -l $ANDROID_SDK_ROOT/ndk/
                exit 1
              fi
              echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
              echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}" >> $GITHUB_ENV
              echo "NDK Path: $ANDROID_NDK_HOME"
              ls -l $ANDROID_NDK_HOME

          # --- iOS --- (Using macOS runner) - Requires Xcode installed on runner
          - os: macos-latest
            target_name: iOS-arm64
            bazel_config: "--config=ios_arm64 -c opt"
            artifact_suffix: ios-arm64
            setup_script: |
              set -ex
              brew install python || true
              pip3 install numpy==1.23.5 wheel # Adjust numpy version if needed

          # Add other iOS targets (Simulator) if needed, using similar setup
          # - os: macos-latest
          #   target_name: iOS-Simulator-arm64
          #   bazel_config: "--config=ios_sim_arm64 -c opt"
          #   artifact_suffix: ios-simulator-arm64
          #   setup_script: |
          #     set -ex
          #     brew install python || true
          #     pip3 install numpy==1.23.5 wheel

    steps:
    - name: Checkout LiteRT source code
      uses: actions/checkout@v4
      with:
        repository: google-ai-edge/LiteRT # Explicitly checkout LiteRT
        # submodules: 'recursive' # Uncomment if LiteRT uses submodules
        # lfs: true # Uncomment if LiteRT uses Git LFS

    - name: Setup Platform Dependencies and Environment
      # Use bash for all setup scripts for consistency
      shell: bash
      run: ${{ matrix.setup_script }}

    # Use Bazelisk to manage Bazel versions
    - name: Setup Bazelisk (Manages Bazel versions)
      uses: bazelbuild/setup-bazelisk@v3
      # Bazelisk will automatically use .bazelversion if present in LiteRT repo root
      # Otherwise, specify version explicitly if needed:
      # with:
      #   bazel-version: '6.4.0' # Or specific version required by LiteRT

    - name: Show Bazel version
      run: bazel --version

    # IMPORTANT: Configure LiteRT Workspace (Likely needed for non-Android)
    - name: Configure Workspace (Run LiteRT setup)
      shell: bash
      run: |
        set -ex
        # Check if a configure script exists. Common pattern for TF/TFLite based projects.
        if [ -f ./configure.py ]; then
          # Set environment variables needed by configure.py
          # Ensure python3 is used, adjust path if needed
          export PYTHON_BIN_PATH=$(which python3 || which python)
          echo "Configuring workspace using PYTHON_BIN_PATH=${PYTHON_BIN_PATH}"
          # Run configure.py non-interactively, accepting defaults
          # You might need to adjust flags based on configure.py's options
          python3 ./configure.py
        elif [ -f ./configure ]; then
           echo "Configuring workspace using ./configure"
          ./configure # Adjust if it needs specific flags or env vars
        else
          echo "No ./configure.py or ./configure script found. Skipping configuration step."
          # If builds fail later, configuration might be needed manually or via env vars.
        fi

    - name: Build LiteRT C API Library
      shell: bash
      run: |
        set -ex
        echo "Building with Bazel config: ${{ matrix.bazel_config }}"
        # The target might be different, check LiteRT's BUILD files.
        # Common alternatives: //tensorflow/lite/c:tensorflowlite_c (in TFLite)
        # Verify the exact target name in google-ai-edge/LiteRT/tensorflow/lite/c/BUILD
        LITERT_C_TARGET="//tensorflow/lite/c:litert_c_api"

        echo "Attempting to build target: ${LITERT_C_TARGET}"
        # Limit jobs to prevent runner resource exhaustion
        # Add --verbose_failures for detailed errors on failure
        bazel build ${LITERT_C_TARGET} ${{ matrix.bazel_config }} --verbose_failures --jobs=2

    - name: Prepare Artifacts
      shell: bash
      run: |
        set -ex
        ARTIFACT_DIR="litert_build_${{ matrix.artifact_suffix }}"
        mkdir -p "${ARTIFACT_DIR}/lib"
        # Ensure include path matches the header locations relative to workspace root
        INCLUDE_DEST="${ARTIFACT_DIR}/include/tensorflow/lite/c"
        mkdir -p "${INCLUDE_DEST}"

        LITERT_C_TARGET="//tensorflow/lite/c:litert_c_api" # Use the same target as build step

        # Use bazel cquery to find the output file path reliably
        # Note: output=files might list multiple files (e.g., .a, .so). Filter for the library.
        # Adjust the grep pattern based on expected file extension (.a, .lib, .so, .dylib)
        LIB_PATH_QUERY=$(bazel cquery ${LITERT_C_TARGET} ${{ matrix.bazel_config }} --output=files 2>/dev/null | grep -E '\.(a|lib)$' | head -n 1) || true # Static lib focus

        if [ -z "$LIB_PATH_QUERY" ] || [ ! -f "$LIB_PATH_QUERY" ]; then
          echo "Warning: bazel cquery did not find the static library (.a/.lib) directly for ${LITERT_C_TARGET}. Searching bazel-bin..."
          # Fallback: Search common library names within bazel-bin
          # Adjust find pattern if library name is different
          SEARCH_PATTERN_A="*liblitert_c_api.a"
          SEARCH_PATTERN_LIB="*litert_c_api.lib"
          LIB_PATH=$(find bazel-bin/ -path '*/tensorflow/lite/c/*' -name "${SEARCH_PATTERN_A}" -o -name "${SEARCH_PATTERN_LIB}" -print -quit)

          if [ -z "$LIB_PATH" ] || [ ! -f "$LIB_PATH" ]; then
            echo "Error: Could not find the built library file in bazel-bin."
            echo "Listing potential library files in bazel-bin:"
            find bazel-bin/ -name "*.a" -o -name "*.lib" -o -name "*.so" -o -name "*.dylib" -o -name "*.dll"
            exit 1
          fi
          echo "Found library via find: ${LIB_PATH}"
        else
           LIB_PATH="$LIB_PATH_QUERY"
           echo "Found library via cquery: ${LIB_PATH}"
        fi

        # Copy the found library file
        cp -v "${LIB_PATH}" "${ARTIFACT_DIR}/lib/"

        # Copy public header files - **VERIFY THESE PATHS** in the LiteRT source tree
        echo "Copying header files..."
        HEADER_SRC_DIR="tensorflow/lite/c" # Source directory relative to repo root
        if [ -d "${HEADER_SRC_DIR}" ]; then
          cp -v "${HEADER_SRC_DIR}"/*.h "${INCLUDE_DEST}/"
        else
           echo "Warning: Header source directory ${HEADER_SRC_DIR} not found."
        fi
        # Potentially copy common headers if needed by litert_c_api.h
        # COMMON_HEADER_SRC="tensorflow/lite/common"
        # COMMON_HEADER_DEST="${ARTIFACT_DIR}/include/tensorflow/lite/common"
        # if [ -d "${COMMON_HEADER_SRC}" ]; then
        #   mkdir -p "${COMMON_HEADER_DEST}"
        #   cp -v "${COMMON_HEADER_SRC}"/*.h "${COMMON_HEADER_DEST}/"
        # fi

        # Package the artifact
        ARCHIVE_NAME="${ARTIFACT_DIR}"
        echo "Creating archive: ${ARCHIVE_NAME}"
        if [ "$RUNNER_OS" == "Windows" ]; then
          7z a "${ARCHIVE_NAME}.zip" "${ARTIFACT_DIR}/"
          echo "ARCHIVE_FILE=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
        else
          tar -czvf "${ARCHIVE_NAME}.tar.gz" "${ARTIFACT_DIR}/"
          echo "ARCHIVE_FILE=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
        fi
        echo "Artifact DIR: ${ARTIFACT_DIR}"
        ls -R "${ARTIFACT_DIR}" # List contents of the artifact dir for verification


    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: litert-libs-${{ matrix.artifact_suffix }}
        # Use the exact archive file name determined in the previous step
        path: ${{ env.ARCHIVE_FILE }}
        retention-days: 7
