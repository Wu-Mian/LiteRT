name: Build LiteRT for Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  ANDROID_NDK_HOME: /opt/android-ndk-r25c

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v2

      - name: Setup Android NDK
        run: |
          sudo mkdir -p /opt
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          sudo unzip -q android-ndk-r25c-linux.zip -d /opt

      - name: Build Android Libraries
        run: |
          bazel build //litert/core:litert \
            --config=android \
            --fat_apk_cpu=armeabi-v7a,arm64-v8a,x86,x86_64

      - name: Prepare Artifacts
        run: |
          # 创建明确输出目录并复制产物
          mkdir -p artifacts/android/libs
          find bazel-bin/litert/core -name '*.so' -exec cp {} artifacts/android/libs \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4  # 关键修复：升级到 v4
        with:
          name: litert-android-libs
          path: artifacts/android  # 确保路径存在
