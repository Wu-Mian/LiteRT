name: Build LiteRT for Android and iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: android
            runs_on: ubuntu-latest         # 安卓构建环境
            config: android                # Bazel 构建时使用的 Android 配置
            target: //lite_rt:litert        # 请根据实际的 BUILD 文件调整目标名称
          - platform: ios
            runs_on: macos-latest          # iOS 构建需要 macOS 环境
            config: ios                    # Bazel 构建时使用的 iOS 配置
            target: //lite_rt:litert        # 请根据实际的 BUILD 文件调整目标名称
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Bazelisk
        run: |
          # 根据当前运行平台下载适用的 Bazelisk 二进制文件
          if [ "$RUNNER_OS" = "Linux" ]; then
            curl -L -o bazelisk https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          elif [ "$RUNNER_OS" = "Darwin" ]; then
            curl -L -o bazelisk https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-darwin-amd64
          else
            echo "Unsupported OS: $RUNNER_OS"
            exit 1
          fi
          chmod +x bazelisk
          sudo mv bazelisk /usr/local/bin/bazel
          bazel version

      - name: Build LiteRT for ${{ matrix.platform }}
        run: |
          # 使用 Bazelisk 调用 Bazel 进行构建，根据平台传入不同配置
          bazel build ${{ matrix.target }} --config=${{ matrix.config }} --compilation_mode=opt --verbose_failures

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LiteRT-${{ matrix.platform }}
          path: bazel-bin/**
