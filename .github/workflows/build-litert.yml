name: Build LiteRT for Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
          with:
    submodules: 'recursive'

      - name: Set up Bazelisk
        run: |
          # 下载最新版 Bazelisk Linux 版
          curl -L -o bazelisk https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x bazelisk
          # 将 Bazelisk 重命名为 bazel 并移至 /usr/local/bin/
          sudo mv bazelisk /usr/local/bin/bazel
          # 输出 Bazel 版本信息，确认 Bazelisk 已正常安装
          bazel version

      - name: Build LiteRT for Android
        run: |
          # 使用 Bazel 构建目标，--config=android 表示使用 Android 平台所需的配置
          bazel build //lite_rt:litert --config=android --compilation_mode=opt --verbose_failures

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LiteRT-android
          # 根据你的 BUILD 文件，构建产物一般位于 bazel-bin 目录下，这里上传所有产物，你可进一步调整路径以精确匹配需要上传的文件
          path: bazel-bin/**
